version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ventiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ventiq
      POSTGRES_USER: ventiq
      POSTGRES_PASSWORD: ventiq_dev_password
    ports:
      - '5432:5432'
    volumes:
      - ventiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ventiq']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ventiq-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ventiq_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ventiq_pgdata:
  ventiq_redis:

version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: ventiq-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - ventiq_mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ventiq-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ventiq_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ventiq_mongo_data:
  ventiq_redis:
